services:
  bot:
    build:
      context: .
      target: runtime
    env_file: .env
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    volumes:
      - bot-data:/data
      - bot-temp:/tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 5s

volumes:
  bot-data:
  bot-temp:
